<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Côte d'Azur</title>
  <style>
    /* Bannière avec texte lisible */
    .banner {
      width: 100%;
      height: 300px;
      background-image: url('images/background.jpg');
      background-size: cover;
      background-position: center;
      display: flex;
      justify-content: center;
      align-items: center;
      color: white;
      font-size: 2.5em;
      font-weight: bold;
      text-align: center;
      text-shadow: 2px 2px 6px rgba(0,0,0,0.7);
      position: relative;
    }

    /* Optionnel : un fond semi-transparent derrière le texte */
    .banner::after {
      content: "";
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background-color: rgba(0,0,0,0.3);
      z-index: 1;
    }

    .banner span {
      position: relative;
      z-index: 2;
    }

    /* Conteneur des cartes */
    .container {
      padding: 20px;
      display: flex;
      flex-direction: column; /* Met les cartes en colonne */
      gap: 20px;              /* Espace entre les cartes */
      align-items: center;     /* Centre horizontalement les cartes */
    }

    .card {
      width: 300px;            /* Largeur des cartes */
      text-align: center;
      box-shadow: 0 4px 8px rgba(0,0,0,0.2);
      border-radius: 10px;
      overflow: hidden;
      transition: transform 0.3s;
    }

    .card:hover {
      transform: translateY(-5px); /* Petit effet au survol */
    }

    .card img {
      width: 100%;
      height: auto;
      display: block;
    }

    .card h3 {
      margin: 10px 0;
      font-size: 1.5em;
      color: #333;
    }

    /* Responsive pour petits écrans */
    @media (max-width: 500px) {
      .banner {
        font-size: 1.8em;
        height: 200px;
      }
      .card {
        width: 90%;
      }
    }
  </style>
</head>
<body>

  <!-- Bannière -->
  <div class="banner">
    <span>Lieux à visiter sur la Côte d'Azur</span>
  </div>

  <!-- Cartes -->
  <div class="container">

    <div class="card">
      <img src="images/nice.jpg" alt="Nice">
      <h3>Nice</h3>
    </div>

    <div class="card">
      <img src="images/cannes.jpg" alt="Cannes">
      <h3>Cannes</h3>
    </div>

    <div class="card">
      <img src="images/monaco.jpg" alt="Monaco">
      <h3>Monaco</h3>
    </div>

  </div>

</body>
</html>
